<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteboard — Repository Stats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 16px 60px;
        }

        /* ── Header ── */
        header {
            width: 100%;
            max-width: 820px;
            margin-bottom: 36px;
            text-align: center;
        }

        .repo-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #58a6ff;
            letter-spacing: -0.5px;
        }

        header p.description {
            margin-top: 8px;
            font-size: 1rem;
            color: #8b949e;
            line-height: 1.5;
        }

        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            padding: 8px 18px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            text-decoration: none;
            font-size: 0.875rem;
            transition: background 0.2s, border-color 0.2s;
        }

        .github-link:hover {
            background: #30363d;
            border-color: #8b949e;
            color: #e6edf3;
        }

        .github-link svg {
            flex-shrink: 0;
        }

        /* ── Cards grid ── */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 820px;
            margin-bottom: 36px;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .card .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #8b949e;
        }

        .card .value {
            font-size: 1.15rem;
            font-weight: 600;
            color: #e6edf3;
            word-break: break-word;
        }

        .card .value a {
            color: #58a6ff;
            text-decoration: none;
        }

        .card .value a:hover {
            text-decoration: underline;
        }

        /* ── Language section ── */
        .lang-section {
            width: 100%;
            max-width: 820px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 28px 32px;
        }

        .lang-section h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: #c9d1d9;
        }

        /* Responsive two-column layout */
        .lang-content {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            align-items: center;
            justify-content: center;
        }

        .chart-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            flex-shrink: 0;
        }

        canvas#langChart {
            width: 100%;
            height: 100%;
        }

        .chart-center-label {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .chart-center-label .total-label {
            font-size: 0.7rem;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .chart-center-label .total-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #e6edf3;
        }

        /* Legend */
        .lang-legend {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .legend-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .legend-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .legend-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #c9d1d9;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-pct {
            font-size: 0.9rem;
            font-weight: 600;
            color: #e6edf3;
        }

        .bar-bg {
            height: 6px;
            background: #30363d;
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s ease;
        }

        /* ── Footer ── */
        footer {
            margin-top: 48px;
            font-size: 0.75rem;
            color: #484f58;
        }

        /* ── Responsive tweaks ── */
        @media (max-width: 480px) {
            header h1 { font-size: 1.5rem; }
            .lang-section { padding: 20px 18px; }
            .chart-wrapper { width: 180px; height: 180px; }
        }
    </style>
</head>
<body>

<header>
    <div class="repo-icon">📋</div>
    <h1>Whiteboard</h1>
    <p class="description">Whiteboard I'm making for my local vet clinic</p>
    <a class="github-link" href="https://github.com/Rehman1105/Whiteboard" target="_blank" rel="noopener noreferrer">
        <!-- GitHub mark icon -->
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                     0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                     -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87
                     2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
                     0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12

                     .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82
                     .44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15

                     A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        View on GitHub
    </a>
</header>

<!-- Info cards -->
<div class="cards">
    <div class="card">
        <span class="label">Owner</span>
        <span class="value">Rehman1105</span>
    </div>
    <div class="card">
        <span class="label">Repository</span>
        <span class="value">Whiteboard</span>
    </div>
    <div class="card">
        <span class="label">Languages</span>
        <span class="value">3</span>
    </div>
    <div class="card">
        <span class="label">Source</span>
        <span class="value">
            <a href="https://github.com/Rehman1105/Whiteboard" target="_blank" rel="noopener noreferrer">
                github.com
            </a>
        </span>
    </div>
</div>

<!-- Language chart -->
<section class="lang-section">
    <h2>Language Composition</h2>
    <div class="lang-content">
        <div class="chart-wrapper">
            <canvas id="langChart" width="440" height="440"></canvas>
            <div class="chart-center-label">
                <span class="total-label">Languages</span>
                <span class="total-value">3</span>
            </div>
        </div>

        <div class="lang-legend" id="langLegend"></div>
    </div>
</section>

<footer>
    Data sourced from GitHub · Whiteboard by Rehman1105
</footer>

<script>
    <!-- Language breakdown – captured April 2026. Update these values if the codebase composition changes. -->
    const languages = [
        { name: "JavaScript", pct: 74.8, color: "#f1e05a" },
        { name: "CSS",        pct: 16.7, color: "#563d7c" },
        { name: "HTML",       pct:  8.5, color: "#e34c26" }
    ];

    /* ── Donut chart via Canvas ── */
    function drawDonut(canvas, data) {
        const ctx = canvas.getContext("2d");
        const W = canvas.width;
        const H = canvas.height;
        const cx = W / 2;
        const cy = H / 2;
        const outerR = Math.min(W, H) / 2 - 8;
        const DONUT_HOLE_RATIO = 0.55; // inner radius as a fraction of outer (controls hole size)
        const innerR = outerR * DONUT_HOLE_RATIO;
        const gap = 0.025; // gap between slices in radians

        let startAngle = -Math.PI / 2;

        data.forEach(lang => {
            const sweep = (lang.pct / 100) * (2 * Math.PI) - gap;
            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(startAngle + gap / 2) * innerR,
                       cy + Math.sin(startAngle + gap / 2) * innerR);
            ctx.arc(cx, cy, outerR, startAngle + gap / 2, startAngle + gap / 2 + sweep);
            ctx.arc(cx, cy, innerR, startAngle + gap / 2 + sweep, startAngle + gap / 2, true);
            ctx.closePath();
            ctx.fillStyle = lang.color;
            ctx.fill();
            startAngle += sweep + gap;
        });
    }

    drawDonut(document.getElementById("langChart"), languages);

    /* ── Legend with bar ── */
    const legendEl = document.getElementById("langLegend");
    languages.forEach(lang => {
        const item = document.createElement("div");
        item.className = "legend-item";
        item.innerHTML = `
            <div class="legend-top">
                <span class="legend-name">
                    <span class="dot" style="background:${lang.color}"></span>
                    ${lang.name}
                </span>
                <span class="legend-pct">${lang.pct}%</span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill" style="background:${lang.color}; width:0%"
                     data-target="${lang.pct}%"></div>
            </div>`;
        legendEl.appendChild(item);
    });

    /* Animate bars after a short delay */
    requestAnimationFrame(() => {
        setTimeout(() => {
            document.querySelectorAll(".bar-fill").forEach(bar => {
                bar.style.width = bar.dataset.target;
            });
        }, 100);
    });
</script>
</body>
</html>
