<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Whiteboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            background: #d3d3d3;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border: 4px solid black;
            padding: 40px 60px;
            text-align: center;
            max-width: 480px;
            width: 90%;
        }
        h1 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        p {
            color: #555;
            margin-bottom: 32px;
            font-size: 15px;
            line-height: 1.5;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        a {
            display: block;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            border: 2px solid #999;
            border-radius: 4px;
            background: #f0f0f0;
            color: #333;
            transition: 0.2s;
        }
        a:hover {
            background: #e0e0e0;
            border-color: #666;
        }
        .note {
            margin-top: 24px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Whiteboard</h1>
        <p>Open the editor to add and arrange content on the board.
           Open the display view on a separate screen to show the board read-only.</p>
        <div class="buttons">
            <a href="board.html?mode=editor" target="_blank">Open Editor</a>
            <a href="board.html?mode=board" target="_blank">Open Display (read-only)</a>
        </div>
        <p class="note">Both windows stay in sync automatically via your browser.</p>
    </div>
</body>
</html>
